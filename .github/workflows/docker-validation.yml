name: Docker Validation CI
# Validates that the deployable Docker image builds successfully on PRs to main.
# This workflow never pushes images — it is purely a build correctness check.
# Image publishing is handled by build-dev.yaml (on push to main).

on:
  pull_request:
    branches: [main]
    # Only run when files that affect the Docker build context change,
    # or when this workflow file itself changes.
    paths:
      - "portals/**"
      - ".github/workflows/docker-validation.yml"

jobs:
  docker-validate:
    name: Validate trader-portal image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # BuildKit is required for cache-from/cache-to and multi-stage build optimisations.
      - uses: docker/setup-buildx-action@v3

      - name: Build trader-portal image
        uses: docker/build-push-action@v6
        with:
          context: ./portals # full portals/ workspace needed for shared packages
          file: ./portals/apps/trader-app/Dockerfile
          push: false # validation only — never push in this workflow
          tags: trader-app:validate
          # GHA cache backend reuses layers across runs, keyed by image name.
          cache-from: type=gha
          cache-to: type=gha,mode=max