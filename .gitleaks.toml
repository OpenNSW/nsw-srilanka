title = "nsw-srilanka gitleaks configuration"

[extend]
# Inherit the full gitleaks default ruleset and extend with the allowlists below.
useDefault = true

[allowlist]
# Example and template files contain placeholder values only, never real credentials.
description = "Placeholder values in example config and env template files"
paths = [
  '''configs/[^/]+\.example\.json''',
  '''(^|/)\.env\.example$''',
  '''portals/apps/trader-app/\.env\.example''',
]
