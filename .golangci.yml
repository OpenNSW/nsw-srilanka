version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck      # unhandled errors
    - govet         # suspicious constructs (printf, shadow, etc.)
    - staticcheck   # full staticcheck suite (SA/S/QF checks)
    - unused        # unexported identifiers never used outside their package

    # Style / maintainability
    - gofmt         # formatting (also enforced in pre-commit hook)
    - goimports     # import grouping and ordering
    - misspell      # common spelling mistakes in comments and strings
    - godot         # comment sentences should end with a period

    # Security-adjacent
    - gosec         # OWASP-oriented security checks
    - noctx         # http.NewRequest / http.Get without context.Context

    # Complexity
    - gocyclo       # cyclomatic complexity
    - gocritic      # opinionated but high signal-to-noise style checks

  settings:
    gocyclo:
      min-complexity: 15

    gosec:
      excludes:
        # G304: file path constructed from variable. Config loaders in this repo
        # take validated paths from typed config structs, not raw user input.
        - G304
        # G115: integer overflow conversion. False positive originating from
        # generated code in the Temporal SDK dependency.
        - G115

    gocritic:
      disabled-checks:
        # appendAssign fires as a false positive on GORM scan patterns.
        - appendAssign

  exclusions:
    paths:
      - vendor

    rules:
      # Test files: relax errcheck (test helpers often ignore errors intentionally)
      # and gosec (test fixtures may use insecure patterns by design).
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec
